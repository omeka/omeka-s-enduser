site_name: Omeka S User Manual
theme:
    name: 'material'
    custom_dir: 'omeka/'
    include_homepage_in_sidebar: true
    logo: logo.png
    favicon: logo.png
    features: 
      - navigation.path
      - navigation.expand
      - toc.integrate
      - toc.follow
      - search.highlight
      - search.share
      - content.action.edit
    palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
site_url: https://omeka.org/s/
repo_url: https://github.com/omeka/omeka-s/
repo_name: 'Omeka S'
edit_uri: https://github.com/omeka/omeka-s-enduser/edit/master/docs
extra_css:
    - css/extra.css
markdown_extensions:
    - admonition
    - attr_list
    - toc:
        permalink: 
nav:
    - index.md
    - accessibility.md
    - s-planning-tips.md
    - install.md
    - admin-dashboard.md
    - glossary.md
